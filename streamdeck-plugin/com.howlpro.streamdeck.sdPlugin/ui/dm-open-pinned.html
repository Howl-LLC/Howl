<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Open DM</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="sdpi-wrapper">
    <div class="sdpi-item">
      <div class="sdpi-item-label">User</div>
      <select class="sdpi-item-value" id="user-select">
        <option value="">Loading...</option>
      </select>
    </div>
    <div id="status" class="status-msg"></div>
  </div>

  <script>
    var websocket, uuid, actionInfo, currentSettings;

    function connectElgatoStreamDeckSocket(port, propertyInspectorUUID, registerEvent, info, inActionInfo) {
      uuid = propertyInspectorUUID;
      actionInfo = JSON.parse(inActionInfo);
      currentSettings = actionInfo.payload.settings || {};

      websocket = new WebSocket('ws://127.0.0.1:' + port);

      websocket.addEventListener('open', function() {
        websocket.send(JSON.stringify({ event: registerEvent, uuid: propertyInspectorUUID }));
        // Request DM list from the plugin (try pinned-dms first, fallback to dms)
        sendToPlugin({ type: 'list', resource: 'pinned-dms' });
      });

      websocket.addEventListener('message', function(ev) {
        var m = JSON.parse(ev.data);
        if (m.event === 'sendToPropertyInspector') {
          handlePluginMessage(m.payload);
        }
      });
    }

    function setSettings(settings) {
      currentSettings = settings;
      websocket.send(JSON.stringify({
        event: 'setSettings',
        context: uuid,
        payload: settings,
      }));
    }

    function sendToPlugin(payload) {
      websocket.send(JSON.stringify({
        event: 'sendToPlugin',
        action: actionInfo.action,
        context: uuid,
        payload: payload,
      }));
    }

    var triedFallback = false;

    function handlePluginMessage(payload) {
      if (!payload) return;
      var statusEl = document.getElementById('status');

      if (payload.type === 'list-response') {
        var data = payload.data || [];
        if (data.length === 0 && payload.resource === 'pinned-dms' && !triedFallback) {
          // No pinned DMs; fall back to all DMs
          triedFallback = true;
          sendToPlugin({ type: 'list', resource: 'dms' });
          return;
        }
        populateUsers(data);
        statusEl.textContent = '';
        statusEl.className = 'status-msg';
      } else if (payload.type === 'list-error') {
        if (payload.resource === 'pinned-dms' && !triedFallback) {
          triedFallback = true;
          sendToPlugin({ type: 'list', resource: 'dms' });
          return;
        }
        statusEl.textContent = 'Error loading users: ' + (payload.error || 'unknown');
        statusEl.className = 'status-msg error';
      }
    }

    function populateUsers(users) {
      var select = document.getElementById('user-select');
      select.innerHTML = '<option value="">-- Select User --</option>';
      users.forEach(function(u) {
        var opt = document.createElement('option');
        opt.value = u.id || u.userId;
        opt.textContent = u.displayName || u.username || u.id || u.userId;
        opt.setAttribute('data-display-name', u.displayName || u.username || '');
        opt.setAttribute('data-avatar-url', u.avatarUrl || '');
        if (currentSettings.userId === (u.id || u.userId)) opt.selected = true;
        select.appendChild(opt);
      });

      if (users.length === 0) {
        select.innerHTML = '<option value="">No DM users found</option>';
      }
    }

    // Event listeners
    document.getElementById('user-select').addEventListener('change', function() {
      var userId = this.value;
      var selected = this.options[this.selectedIndex];
      var displayName = selected ? selected.getAttribute('data-display-name') : '';
      var avatarUrl = selected ? selected.getAttribute('data-avatar-url') : '';

      setSettings({
        userId: userId,
        displayName: displayName || '',
        avatarUrl: avatarUrl || '',
      });
    });
  </script>
  <script src="./shared/pair-panel.js"></script>
</body>
</html>
