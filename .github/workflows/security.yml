name: Security & Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger from Actions tab
  schedule:
    - cron: '30 6 * * 1'  # Weekly Monday 6:30 UTC

permissions:
  contents: read

jobs:
  oss-guard:
    name: OSS Publish Guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Secret and local-path guard
        run: bash scripts/ci-oss-guard.sh

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      # The gitleaks GitHub Action requires a paid license for organizations;
      # the gitleaks CLI is free/open-source. Install a pinned release and scan
      # the diff directly — it auto-loads the repo's .gitleaks.toml. Scoped to the
      # PR/push range so it gates NEW secrets without failing on pre-existing
      # historical findings (legacy history is not re-scanned here; a scheduled
      # full scan needs a reviewed .gitleaksignore first).
      - name: Gitleaks – detect hardcoded secrets (CLI, diff-scoped)
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          /tmp/gitleaks version
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --quiet origin "${{ github.base_ref }}"
            LOGOPTS="origin/${{ github.base_ref }}..HEAD"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            LOGOPTS="${{ github.event.before }}..${{ github.sha }}"
          else
            LOGOPTS="-1"
          fi
          echo "gitleaks scanning range: $LOGOPTS"
          /tmp/gitleaks git . --redact --no-banner --log-opts="$LOGOPTS"

  sast:
    name: Static Analysis (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

      - name: Run CodeQL analysis
        # Code scanning (SARIF upload) requires code scanning enabled on the
        # repository; until it is, the upload is rejected and the step fails.
        # Tolerate that so CI stays green while the analysis still runs. Remove
        # this once code scanning is enabled on the repository.
        continue-on-error: true
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Audit root packages (high+)
        run: npm audit --production --audit-level=high
        continue-on-error: true

      - name: Audit backend packages (high+)
        run: npm audit --production --audit-level=high
        working-directory: backend
        continue-on-error: true

  licenses:
    name: License Compatibility (AGPL-3.0)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm

      # Scan the workspaces that actually ship code (root frontend/electron,
      # backend, admin). Dev deps are scanned too — fail-closed is cheap and a
      # build tool sneaking in an incompatible license still gets a human look.
      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install admin dependencies
        run: npm ci
        working-directory: admin

      - name: Check dependency licenses against AGPL-3.0
        run: npm run check:licenses

  lint:
    name: Lint & Security Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          # Full clone — the schema-compat check needs the merge base with
          # origin/main to diff Prisma migrations and schema-shape changes.
          # A shallow clone makes the diff fail loud (was previously a silent
          # skip that allowed destructive SQL to slip through).
          fetch-depth: 0

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Lint frontend
        run: npm run lint

      - name: Lint backend
        run: npm run lint
        working-directory: backend

      - name: Fetch origin/main for migration diff
        run: git fetch origin main

      - name: Schema compat check
        run: npm run check:schema-compat
        env:
          # When the PR carries the `compat-break-approved` label, downgrade
          # all violations to warnings (still printed, but the job stays green).
          # The label MUST also be paired with a protocolVersion bump or a
          # documented two-phase deploy plan in the PR body.
          COMPAT_BREAK_APPROVED: ${{ contains(github.event.pull_request.labels.*.name, 'compat-break-approved') }}

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      # The admin app is a separate package with its own deps (e.g. recharts);
      # it is excluded from the root frontend tsconfig and type-checked here in
      # its own context so its types stay covered.
      - name: Install admin dependencies
        run: npm ci
        working-directory: admin

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend

      - name: TypeScript check (frontend)
        run: npx tsc --noEmit

      - name: TypeScript check (backend)
        run: npx tsc --noEmit
        working-directory: backend

      - name: TypeScript check (admin)
        run: npx tsc --noEmit
        working-directory: admin

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install admin dependencies
        run: npm ci
        working-directory: admin

      - name: Build frontend
        run: npm run build:frontend

      - name: Build admin panel
        run: npm run build:admin

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: howl
          POSTGRES_PASSWORD: howl
          POSTGRES_DB: howl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://howl:howl@localhost:5432/howl_test
      NODE_ENV: test
      JWT_SECRET: test-secret-ci-only
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend

      - name: Run database migrations
        run: npx prisma migrate deploy
        working-directory: backend

      - name: Run tests
        run: npm test
        working-directory: backend

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run frontend tests
        run: npx vitest run
