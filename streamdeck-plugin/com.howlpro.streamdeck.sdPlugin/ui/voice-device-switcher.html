<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cycle Audio Device</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="sdpi-wrapper">
    <div class="sdpi-item">
      <div class="sdpi-item-label">Device Kind</div>
      <div class="sdpi-item-value radio-group">
        <label>
          <input type="radio" name="kind" value="input">
          Input (microphone)
        </label>
        <label>
          <input type="radio" name="kind" value="output">
          Output (speakers)
        </label>
        <label>
          <input type="radio" name="kind" value="both" checked>
          Both
        </label>
      </div>
    </div>
  </div>

  <script>
    var websocket, uuid, actionInfo, currentSettings;

    function connectElgatoStreamDeckSocket(port, propertyInspectorUUID, registerEvent, info, inActionInfo) {
      uuid = propertyInspectorUUID;
      actionInfo = JSON.parse(inActionInfo);
      currentSettings = actionInfo.payload.settings || {};

      // Restore saved selection
      var savedKind = currentSettings.kind || 'both';
      var radios = document.querySelectorAll('input[name="kind"]');
      radios.forEach(function(r) {
        r.checked = (r.value === savedKind);
      });

      websocket = new WebSocket('ws://127.0.0.1:' + port);

      websocket.addEventListener('open', function() {
        websocket.send(JSON.stringify({ event: registerEvent, uuid: propertyInspectorUUID }));
      });

      websocket.addEventListener('message', function(ev) {
        var m = JSON.parse(ev.data);
        if (m.event === 'sendToPropertyInspector') {
          // No list data needed for this PI
        }
      });
    }

    function setSettings(settings) {
      currentSettings = settings;
      websocket.send(JSON.stringify({
        event: 'setSettings',
        context: uuid,
        payload: settings,
      }));
    }

    // Event listeners
    document.querySelectorAll('input[name="kind"]').forEach(function(radio) {
      radio.addEventListener('change', function() {
        if (this.checked) {
          setSettings({ kind: this.value });
        }
      });
    });
  </script>
  <script src="./shared/pair-panel.js"></script>
</body>
</html>
