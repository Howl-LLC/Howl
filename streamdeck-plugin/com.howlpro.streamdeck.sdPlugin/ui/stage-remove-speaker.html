<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Remove Speaker</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="sdpi-wrapper">
    <div class="info-note">
      Paste the user ID of the speaker to remove from the stage. The list of
      current stage speakers changes dynamically. A live speaker picker will
      be added in v2.
    </div>
    <div class="sdpi-item">
      <div class="sdpi-item-label">User ID</div>
      <input class="sdpi-item-value" type="text" id="user-id-input" placeholder="Paste user ID">
    </div>
    <div class="sdpi-item">
      <div class="sdpi-item-label">Display Name</div>
      <input class="sdpi-item-value" type="text" id="display-name-input" placeholder="(optional) label for the key">
    </div>
  </div>

  <script>
    var websocket, uuid, actionInfo, currentSettings;

    function connectElgatoStreamDeckSocket(port, propertyInspectorUUID, registerEvent, info, inActionInfo) {
      uuid = propertyInspectorUUID;
      actionInfo = JSON.parse(inActionInfo);
      currentSettings = actionInfo.payload.settings || {};

      // Restore saved values
      var userIdInput = document.getElementById('user-id-input');
      var displayNameInput = document.getElementById('display-name-input');
      if (currentSettings.userId) userIdInput.value = currentSettings.userId;
      if (currentSettings.displayName) displayNameInput.value = currentSettings.displayName;

      websocket = new WebSocket('ws://127.0.0.1:' + port);

      websocket.addEventListener('open', function() {
        websocket.send(JSON.stringify({ event: registerEvent, uuid: propertyInspectorUUID }));
      });

      websocket.addEventListener('message', function(ev) {
        var m = JSON.parse(ev.data);
        if (m.event === 'sendToPropertyInspector') {
          // No dynamic list data in v1
        }
      });
    }

    function setSettings(settings) {
      currentSettings = settings;
      websocket.send(JSON.stringify({
        event: 'setSettings',
        context: uuid,
        payload: settings,
      }));
    }

    // Event listeners
    var debounceTimer;
    function saveCurrentValues() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function() {
        var userId = document.getElementById('user-id-input').value.trim();
        var displayName = document.getElementById('display-name-input').value.trim();
        setSettings({
          userId: userId,
          displayName: displayName,
          avatarUrl: currentSettings.avatarUrl || '',
        });
      }, 300);
    }

    document.getElementById('user-id-input').addEventListener('input', saveCurrentValues);
    document.getElementById('display-name-input').addEventListener('input', saveCurrentValues);
  </script>
  <script src="./shared/pair-panel.js"></script>
</body>
</html>
