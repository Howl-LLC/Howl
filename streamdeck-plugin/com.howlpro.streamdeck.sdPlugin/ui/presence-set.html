<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Set Status</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="sdpi-wrapper">
    <div class="sdpi-item">
      <div class="sdpi-item-label">Status</div>
      <div class="sdpi-item-value radio-group">
        <label>
          <input type="radio" name="status" value="online">
          <span style="color:#2ecc71;">&#9679;</span> Online
        </label>
        <label>
          <input type="radio" name="status" value="idle">
          <span style="color:#f1c40f;">&#9679;</span> Idle
        </label>
        <label>
          <input type="radio" name="status" value="dnd">
          <span style="color:#e74c3c;">&#9679;</span> Do Not Disturb
        </label>
        <label>
          <input type="radio" name="status" value="invisible">
          <span style="color:#555b63;">&#9679;</span> Invisible
        </label>
      </div>
    </div>
  </div>

  <script>
    var websocket, uuid, actionInfo, currentSettings;

    function connectElgatoStreamDeckSocket(port, propertyInspectorUUID, registerEvent, info, inActionInfo) {
      uuid = propertyInspectorUUID;
      actionInfo = JSON.parse(inActionInfo);
      currentSettings = actionInfo.payload.settings || {};

      // Restore saved selection
      var savedStatus = currentSettings.status || 'online';
      var radios = document.querySelectorAll('input[name="status"]');
      radios.forEach(function(r) {
        r.checked = (r.value === savedStatus);
      });

      websocket = new WebSocket('ws://127.0.0.1:' + port);

      websocket.addEventListener('open', function() {
        websocket.send(JSON.stringify({ event: registerEvent, uuid: propertyInspectorUUID }));
      });

      websocket.addEventListener('message', function(ev) {
        var m = JSON.parse(ev.data);
        if (m.event === 'sendToPropertyInspector') {
          // No list data needed for this PI
        }
      });
    }

    function setSettings(settings) {
      currentSettings = settings;
      websocket.send(JSON.stringify({
        event: 'setSettings',
        context: uuid,
        payload: settings,
      }));
    }

    // Event listeners
    document.querySelectorAll('input[name="status"]').forEach(function(radio) {
      radio.addEventListener('change', function() {
        if (this.checked) {
          setSettings({ status: this.value });
        }
      });
    });
  </script>
  <script src="./shared/pair-panel.js"></script>
</body>
</html>
